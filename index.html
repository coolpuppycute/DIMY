<!DOCTYPE html>
<html lang="en">
<head>

<title>DIMY.io - Arcade</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* ====== INTRO OVERLAY STYLES ====== */
#intro-container {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  background-color: #000000; /* Keeps screen pitch black while video loads */
  z-index: 99999; /* Forces the intro to sit above absolutely everything else */
  display: flex;
  align-items: center;
  justify-content: center;
}

#intro-video {
  width: 100%;
  height: 100%;
  object-fit: cover; /* Keeps video full screen. Change to 'contain' if you don't want it cropped. */
}

#skip-intro-btn {
  position: absolute;
  bottom: 30px;
  right: 30px;
  padding: 8px 16px;
  background: rgba(255, 255, 255, 0.2);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: 4px;
  font-family: sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.2s;
}

#skip-intro-btn:hover {
  background: rgba(255, 255, 255, 0.4);
}

/* Hide the main website container layout initially by default */
#app {
  display: none;
  padding: 1rem 0;
  font-family: var(--font-sans, sans-serif);
}

h1{font-size:21px;font-weight:500;color:var(--color-text-primary, #111);}
.sub{font-size:13px;color:var(--color-text-secondary, #666);}
.tagline{font-size:13px;color:var(--color-text-secondary, #666);margin-bottom:1rem;}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.tab{padding:6px 14px;border-radius:var(--border-radius-md, 6px);border:0.5px solid var(--color-border-secondary, #ccc);background:var(--color-background-primary, #fff);color:var(--color-text-secondary, #666);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.tab.on{background:var(--color-text-primary, #111);color:var(--color-background-primary, #fff);border-color:var(--color-text-primary, #111);}
.sec{display:none;}.sec.on{display:block;}
.panel{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.left,.right{display:flex;flex-direction:column;gap:8px;}

.slot.ok{border-style:solid;border-color:var(--color-border-primary, #111);}
